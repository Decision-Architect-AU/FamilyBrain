services:

  # ─── CORE PROFILE (always running) ───────────────────────────────────────────

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: familybrain-postgres
    profiles: [core, normal, podcast]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-geoff}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?required}
      POSTGRES_DB: openclaw
      DASHBOARD_DB_PASSWORD: ${DASHBOARD_DB_PASSWORD:?required}
      AUDIT_DB_PASSWORD: ${AUDIT_DB_PASSWORD:?required}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD:?required}
      SCRAPER_DB_PASSWORD: ${SCRAPER_DB_PASSWORD:?required}
      AGENTS_DB_PASSWORD: ${AGENTS_DB_PASSWORD:?required}
      CURATOR_DB_PASSWORD: ${CURATOR_DB_PASSWORD:?required}
      PODCAST_DB_PASSWORD: ${PODCAST_DB_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-geoff} -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familybrain-net

  # ollama container removed — using native Windows Ollama on host.docker.internal:11434
  # Install: winget install Ollama.Ollama --source winget

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    container_name: familybrain-dashboard
    profiles: [core, normal, podcast]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DASHBOARD_DB_USER:-dashboard_ro}:${DASHBOARD_DB_PASSWORD:?required}@postgres:5432/openclaw
      MODE_FILE: /shared/current_mode
      WA_AGENT_URL: http://wa-agent:4002
    volumes:
      - shared_state:/shared
      - ./dashboard:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - familybrain-net

  audit-logger:
    build:
      context: ./audit
      dockerfile: Dockerfile
    container_name: familybrain-audit
    profiles: [core, normal, podcast]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${AUDIT_DB_USER:-audit_writer}:${AUDIT_DB_PASSWORD:?required}@postgres:5432/openclaw
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - familybrain-net

  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: familybrain-ingestor
    profiles: [core, normal, podcast]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${CURATOR_DB_USER:-curator}:${CURATOR_DB_PASSWORD:?required}@postgres:5432/openclaw
      AUDIT_SERVICE_URL: http://audit-logger:4000
      OLLAMA_URL: http://172.23.96.1:11434
      MODEL_PARSER_1ST:   ${MODEL_PARSER_1ST:-qwen2.5:3b}
      MODEL_PARSER_2ND:   ${MODEL_PARSER_2ND:-qwen2.5:14b}
      MODEL_PARSER_DEEP:  ${MODEL_PARSER_DEEP:-qwen2.5:32b}
      MODEL_PARSER_VISION: ${MODEL_PARSER_VISION:-qwen2.5:14b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      EXTRACT_MODEL_QUICK:  ${MODEL_PARSER_1ST:-qwen2.5:3b}
      EXTRACT_MODEL_DEEP:   ${MODEL_PARSER_2ND:-qwen2.5:14b}
      EXTRACT_MODEL_DEEPER: ${MODEL_PARSER_DEEP:-qwen2.5:32b}
      EXTRACT_DEEP_PASS:    ${EXTRACT_DEEP_PASS:-false}
      EXTRACT_DEEPER_PASS:  ${EXTRACT_DEEPER_PASS:-false}
      EXTRACT_CHUNK_DELAY:  ${EXTRACT_CHUNK_DELAY:-2}
      INGEST_WATCH_DIR: /data/ReadyToIngest
      INGEST_PROCESSING_DIR: /data/Processing
      INGEST_DONE_DIR: /data/Ingested
    ports:
      - "4001:4001"
    volumes:
      - C:/DataFiles:/data
    depends_on:
      postgres:
        condition: service_healthy
      audit-logger:
        condition: service_started
    networks:
      - familybrain-net

  # ─── NORMAL PROFILE ───────────────────────────────────────────────────────────

  whatsapp:
    build:
      context: ./whatsapp
      dockerfile: Dockerfile
    container_name: familybrain-whatsapp
    hostname: familybrain-whatsapp
    profiles: [normal]
    restart: unless-stopped
    environment:
      WA_AGENT_URL: http://wa-agent:4002
      WA_ALLOWED_NUMBERS: ${WA_ALLOWED_NUMBERS:-}    # comma-separated E.164 numbers, empty = allow all
    shm_size: '256m'
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
    ports:
      - "3002:3002"                                   # QR scanner: http://localhost:3002/qr
    networks:
      - familybrain-net

  wa-agent:
    build:
      context: ./wa-agent
      dockerfile: Dockerfile
    container_name: familybrain-wa-agent
    profiles: [normal]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${CURATOR_DB_USER:-curator}:${CURATOR_DB_PASSWORD:?required}@postgres:5432/openclaw
      OLLAMA_URL: http://172.23.96.1:11434
      MODEL_PARSER_1ST:   ${MODEL_PARSER_1ST:-qwen2.5:3b}
      MODEL_PARSER_2ND:   ${MODEL_PARSER_2ND:-qwen2.5:14b}
      MODEL_PARSER_DEEP:  ${MODEL_PARSER_DEEP:-qwen2.5:32b}
      MODEL_PARSER_VOICE: ${MODEL_PARSER_VOICE:-qwen2.5:14b}
      MODEL_PARSER_VISION: ${MODEL_PARSER_VISION:-qwen2.5:14b}
      AGENT_MODEL: ${MODEL_PARSER_2ND:-qwen2.5:14b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      INGESTOR_URL: http://ingestor:4001
      WHISPER_URL: http://172.23.96.1:11435
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-small}
      WA_SEARCH_TOP_K: ${WA_SEARCH_TOP_K:-5}
      WA_MAX_HISTORY: ${WA_MAX_HISTORY:-6}
      WA_CONTEXT_WINDOW_SEC: ${WA_CONTEXT_WINDOW_SEC:-300}
      MAINTENANCE_CRON: ${MAINTENANCE_CRON:-0 2 * * *}
      TZ: Australia/Brisbane
      TZ_NAME: Australia/Brisbane
      TZ_ABBR: AEST (UTC+10)
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_FROM_NAME:    ${EMAIL_FROM_NAME:-FamilyBrain}
      EMAIL_SMTP_HOST:    ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      EMAIL_SMTP_PORT:    ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER:    ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      WA_BRIDGE_URL: http://whatsapp:3002
      WA_SELF_NUMBER: ${WA_SELF_NUMBER:-}
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      ingestor:
        condition: service_started
    networks:
      - familybrain-net

  maintenance-cron:
    image: alpine:3.19
    container_name: familybrain-maintenance-cron
    profiles: [normal]
    restart: unless-stopped
    environment:
      MAINTENANCE_INTERVAL_SECS: ${MAINTENANCE_INTERVAL_SECS:-300}
      WA_AGENT_URL: http://wa-agent:4002
    command: >
      sh -c 'apk add --no-cache curl &&
             echo "maintenance-cron: starting, interval=$${MAINTENANCE_INTERVAL_SECS}s" &&
             while true; do
               sleep $${MAINTENANCE_INTERVAL_SECS};
               curl -s -X POST $${WA_AGENT_URL}/maintenance && echo;
             done'
    depends_on:
      - wa-agent
    networks:
      - familybrain-net

  n8n:
    image: n8nio/n8n:latest
    container_name: familybrain-n8n
    profiles: [normal]
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: openclaw
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?required}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - familybrain-net

  scraper:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    container_name: familybrain-scraper
    profiles: [normal]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${SCRAPER_DB_USER:-scraper}:${SCRAPER_DB_PASSWORD:?required}@postgres:5432/openclaw
      AUDIT_SERVICE_URL: http://audit-logger:4000
      OLLAMA_URL: http://172.23.96.1:11434
      SCRAPE_SUBURBS: ${SCRAPE_SUBURBS:-Brisbane,QLD}
      SCRAPE_MIN_BEDS: ${SCRAPE_MIN_BEDS:-3}
      SCRAPE_MAX_PRICE: ${SCRAPE_MAX_PRICE:-1500000}
      SCRAPE_CRON: ${SCRAPE_CRON:-0 */6 * * *}
      DEDUP_CRON: ${DEDUP_CRON:-*/15 * * * *}
    depends_on:
      postgres:
        condition: service_healthy
      audit-logger:
        condition: service_started
    networks:
      - familybrain-net

  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: familybrain-agents
    profiles: [normal]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${AGENTS_DB_USER:-pr_agent}:${AGENTS_DB_PASSWORD:?required}@postgres:5432/openclaw
      AUDIT_SERVICE_URL: http://audit-logger:4000
      OLLAMA_URL: http://172.23.96.1:11434
      MODEL_PARSER_1ST:   ${MODEL_PARSER_1ST:-qwen2.5:3b}
      MODEL_PARSER_2ND:   ${MODEL_PARSER_2ND:-qwen2.5:14b}
      MODEL_PARSER_DEEP:  ${MODEL_PARSER_DEEP:-qwen2.5:32b}
      MODEL_PARSER_VISION: ${MODEL_PARSER_VISION:-qwen2.5:14b}
      AGENT_MODEL: ${MODEL_PARSER_DEEP:-qwen2.5:32b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      PR_CRON_TIME: ${PR_CRON_TIME:-07:00}
      PR_RUN_ON_START: ${PR_RUN_ON_START:-false}
    depends_on:
      postgres:
        condition: service_healthy
      audit-logger:
        condition: service_started
    networks:
      - familybrain-net

  # ─── PODCAST PROFILE ─────────────────────────────────────────────────────────

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: familybrain-whisper
    profiles: [podcast]
    restart: unless-stopped
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-medium.en}
      ASR_ENGINE: openai_whisper
    ports:
      - "9000:9000"
    networks:
      - familybrain-net

  tts:
    build:
      context: ./voice
      dockerfile: Dockerfile.piper
    container_name: familybrain-tts
    profiles: [podcast]
    restart: unless-stopped
    ports:
      - "5500:5500"
    networks:
      - familybrain-net

  podcast-agents:
    build:
      context: ./agents
      dockerfile: Dockerfile.podcast
    container_name: familybrain-podcast-agents
    profiles: [podcast]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${PODCAST_DB_USER:-podcast_agent}:${PODCAST_DB_PASSWORD:?required}@postgres:5432/openclaw
      AUDIT_SERVICE_URL: http://audit-logger:4000
      OLLAMA_URL: http://172.23.96.1:11434
      WHISPER_URL: http://172.23.96.1:11434
      TTS_URL: http://tts:5500
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - familybrain-net

  # ─── FAMILY BRAIN GRAPH EXPLORER ─────────────────────────────────────────────
  # graph-api: FastAPI backend — graph CRUD, ingest, quality, templates
  # graph-explorer: React/Vite frontend — http://localhost:5173
  # API docs: http://localhost:4003/docs

  graph-api:
    build:
      context: ./graph-api
      dockerfile: Dockerfile
    container_name: familybrain-graph-api
    profiles: [normal]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${CURATOR_DB_USER:-curator}:${CURATOR_DB_PASSWORD:?required}@postgres:5432/openclaw
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-personal_graph}
      OLLAMA_URL: http://172.23.96.1:11434
      MODEL_PARSER_2ND:  ${MODEL_PARSER_2ND:-qwen2.5:14b}
      EXTRACT_MODEL: ${MODEL_PARSER_2ND:-qwen2.5:14b}
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - familybrain-net

  graph-explorer:
    build:
      context: ./graph-explorer
      dockerfile: Dockerfile
    container_name: familybrain-graph-explorer
    profiles: [normal]
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - graph-api
    networks:
      - familybrain-net

  # ─── AGE VIEWER (legacy) ─────────────────────────────────────────────────────
  # Apache AGE Viewer — kept for raw Cypher access
  # Access at http://localhost:8888
  # Connect with: host=postgres port=5432 db=openclaw user=geoff
  age-viewer:
    build:
      context: ./age-viewer
      dockerfile: Dockerfile
    container_name: familybrain-age-viewer
    profiles: [normal]
    restart: unless-stopped
    ports:
      - "8888:3001"
    networks:
      - familybrain-net

  # ─── EMAIL + CALENDAR SYNC ───────────────────────────────────────────────────

  email-sync:
    build:
      context: ./email-sync
      dockerfile: Dockerfile
    container_name: familybrain-email-sync
    profiles: [normal]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${CURATOR_DB_USER:-curator}:${CURATOR_DB_PASSWORD:?required}@postgres:5432/openclaw

      # Google OAuth2 — shared client credentials for all Gmail accounts
      # Each account's refresh_token is stored in personal.email_account
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:?required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?required}

      # Microsoft OAuth2 — shared app registration for all Outlook/Hotmail accounts
      # Use tenant_id=consumers for personal Microsoft accounts (Hotmail, Outlook.com)
      MICROSOFT_CLIENT_ID:  ${MICROSOFT_CLIENT_ID:?required}
      MICROSOFT_TENANT_ID:  ${MICROSOFT_TENANT_ID:-consumers}

      # Ingestor webhook endpoint (internal Docker network)
      INGESTOR_URL: http://ingestor:4001

      # Calendar mirror routing — set real addresses in .env, never commit them
      CALENDAR_MIRROR_PRIMARY_EMAIL:   ${CALENDAR_MIRROR_PRIMARY_EMAIL:-}
      CALENDAR_MIRROR_SECONDARY_EMAIL: ${CALENDAR_MIRROR_SECONDARY_EMAIL:-}
      CALENDAR_MIRROR_PARTNER_EMAIL:   ${CALENDAR_MIRROR_PARTNER_EMAIL:-}

      # Child keyword lists for calendar routing — comma-separated names/nicknames
      CHILD1_NAMES:   ${CHILD1_NAMES:-}
      CHILD2_NAMES:   ${CHILD2_NAMES:-}
      PARTNER_NAMES:  ${PARTNER_NAMES:-}

      # Primary account owner — used to detect partner events that also involve Glenn
      # OWNER_EMAIL must match Glenn's primary Gmail. OWNER_NAMES are first-name variants.
      OWNER_EMAIL:    ${OWNER_EMAIL:-}
      OWNER_NAMES:    ${OWNER_NAMES:-}
      FB_TAG_DEBUG:   ${FB_TAG_DEBUG:-false}

      # Poll intervals in seconds (override in .env if needed)
      EMAIL_POLL_INTERVAL_SECS:    ${EMAIL_POLL_INTERVAL_SECS:-300}
      CALENDAR_POLL_INTERVAL_SECS: ${CALENDAR_POLL_INTERVAL_SECS:-900}

      # Financial document filing
      FINANCIALS_DIR: /financials
      OLLAMA_URL:     http://172.23.96.1:11434
      MODEL_PARSER_1ST:   ${MODEL_PARSER_1ST:-qwen2.5:3b}
      MODEL_PARSER_2ND:   ${MODEL_PARSER_2ND:-qwen2.5:14b}
      MODEL_PARSER_DEEP:  ${MODEL_PARSER_DEEP:-qwen2.5:32b}
      MODEL_PARSER_VISION: ${MODEL_PARSER_VISION:-qwen2.5:14b}
      AGENT_MODEL:    ${MODEL_PARSER_2ND:-qwen2.5:14b}
      GMAIL_INITIAL_DAYS:   ${GMAIL_INITIAL_DAYS:-730}
      OUTLOOK_INITIAL_DAYS: ${OUTLOOK_INITIAL_DAYS:-730}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${FINANCIALS_HOST_DIR:-//c/Users/Glenn/Documents/FinancialsGW}:/financials
      - ./email-sync/resolv.conf:/etc/resolv.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      ingestor:
        condition: service_started
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - familybrain-net

volumes:
  postgres_data:
  n8n_data:
  shared_state:
  whatsapp_session:

networks:
  familybrain-net:
    driver: bridge
