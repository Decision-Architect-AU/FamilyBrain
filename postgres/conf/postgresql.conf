# OpenClaw Postgres tuning for 96GB unified RAM
# These override the image defaults — adjust after profiling

# Memory
shared_buffers = 8GB                  # ~8% of RAM; pgvector benefits from larger setting
effective_cache_size = 24GB
work_mem = 256MB                      # per sort/hash op; multiple concurrent agents
maintenance_work_mem = 1GB

# WAL
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 4GB

# Connections
max_connections = 100                 # agents + dashboard + n8n

# AGE
shared_preload_libraries = 'age'
session_preload_libraries = 'age'

# Logging (helpful during dev)
log_min_duration_statement = 1000     # log queries > 1s
log_line_prefix = '%t [%p] %u@%d '
